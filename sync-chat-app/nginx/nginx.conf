events {}

http {
    upstream chatapp_backend {
        # ip_hash gives sticky sessions, which SockJS's HTTP-polling fallback
        # transport benefits from (it makes several short-lived HTTP requests
        # per "connection"). It is NOT required for message delivery itself —
        # that correctness comes entirely from Redis Pub/Sub, which is why a
        # client can be moved to a different instance mid-session (e.g. during
        # a rolling deploy) and still receive every message for its rooms.
        ip_hash;
        server app-instance-1:8080;
        server app-instance-2:8080;
    }

    server {
        listen 80;

        location /ws {
            proxy_pass http://chatapp_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        location / {
            proxy_pass http://chatapp_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

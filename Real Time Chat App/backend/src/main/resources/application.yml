server:
  port: 8080

spring:
  application:
    name: realtime-chat-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chatapp}
    username: ${SPRING_DATASOURCE_USERNAME:chatapp}
    password: ${SPRING_DATASOURCE_PASSWORD:chatapp_secret}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-me-in-prod-this-must-be-at-least-32-bytes-long}
    expiration-ms: 86400000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
